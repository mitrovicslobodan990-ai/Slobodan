kind = "mobile"
previewPath = "/"
title = "Couple Chat"
version = "1.0.0"
id = "artifacts/couple-chat"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 21404

[services.development]
run = "pnpm --filter @workspace/couple-chat run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/couple-chat", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/couple-chat", "run", "serve" ]

[services.env]
PORT = "21404"
BASE_PATH = "/"
